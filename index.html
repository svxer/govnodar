<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>stupid slime image</title>
    <link rel="icon" href="./index_files/stupid slime image.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            overflow: hidden;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            margin:0;
            user-select: none;
            --slime-base-y: -45px;
            --slime-nod-peak-y: -75px;
            --settings-menu-safe-bottom: 16px;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        
        .hue-anim { animation: hue-rotate 5s linear infinite; filter: hue-rotate(0deg); }
        @keyframes hue-rotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        #slime-container {
            position: relative;
            width: 100%;
            height: 65vh;
            margin-top: 5vh;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            transition: width 0.42s ease, max-width 0.42s ease, height 0.42s ease, transform 0.42s ease, margin-top 0.42s ease, padding 0.42s ease;
        }

        #slime {
            display: block;
            width: auto;
            height: auto;
            max-width: min(90vw, 90%);
            max-height: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), max-width 0.42s ease, max-height 0.42s ease, filter 0.8s ease-out;
            user-select: none;
            transform: translateY(var(--slime-base-y)) scale(1);
        }

        #slime.blocked {
            filter: brightness(0.7) !important;
            cursor: default;
        }

        .nod-ready {
            animation: nod-anim 0.35s cubic-bezier(0.25, 0.46, 0.45, 1.4);
        }

        @keyframes nod-anim {
            0% { transform: translateY(var(--slime-base-y)); }
            40% { transform: translateY(var(--slime-nod-peak-y)); }
            100% { transform: translateY(var(--slime-base-y)); }
        }

        #text-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            padding: 10px; 
            z-index: 1;
            transition: opacity 0.5s ease, top 0.42s ease, bottom 0.42s ease, left 0.42s ease, width 0.42s ease, transform 0.42s ease, padding 0.42s ease;
            box-sizing: border-box;
        }

        body.split-layout #slime-container {
            width: 50vw;
            max-width: 50vw;
            height: calc(100vh - var(--split-menu-space, 160px));
            margin-top: 0;
            justify-content: flex-end;
            padding-right: clamp(16px, 4vw, 56px);
            box-sizing: border-box;
            transform: translateX(clamp(-24px, -2.5vw, -56px));
        }

        body.split-layout #slime {
            max-width: min(36vw, 90%);
            max-height: min(calc(100vh - var(--split-menu-space, 160px) - 24px), 78vh);
        }

        body.short-split-layout {
            --slime-base-y: -20px;
            --slime-nod-peak-y: -44px;
        }

        body.split-layout #text-container {
            top: 0 !important;
            bottom: var(--split-menu-space, 160px);
            left: 50%;
            right: auto;
            width: min(34vw, 460px);
            transform: translateX(clamp(12px, 1.6vw, 28px));
            align-items: flex-start;
            text-align: left;
            justify-content: center;
            padding: 24px 24px 24px clamp(16px, 3vw, 40px);
            box-sizing: border-box;
        }

        body.split-layout #date {
            font-size: clamp(1.5rem, min(2vw, 4.2vh), 2.8rem);
        }

        body.split-layout #clock {
            font-size: clamp(3rem, min(5.5vw, 9.5vh), 6.5rem);
        }

        body.split-layout #counter {
            font-size: clamp(2rem, min(3.3vw, 5.8vh), 3.9rem);
        }

        body.compact-stack #slime-container {
            height: 52vh;
            margin-top: 3vh;
        }

        body.compact-stack #slime {
            max-height: 88%;
        }

        body.compact-stack #date {
            font-size: 1.6rem;
        }

        body.compact-stack #clock {
            font-size: 3.1rem;
        }

        body.compact-stack #counter {
            font-size: 2.15rem;
        }

        #date { font-size: 2rem; font-weight: 500; color: white; margin: 0; line-height: 1.2; display: flex; pointer-events: auto; transition: font-size 0.35s ease; }
        #clock { font-size: 4rem; font-weight: 600; margin: 0; line-height: 1.2; display: flex; pointer-events: auto; transition: font-size 0.35s ease, transform 0.35s ease; }
        #counter {
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
            margin: 5px 0 0 0;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), font-size 0.35s ease;
            line-height: 1;
            display: flex;
            position: relative;
            pointer-events: auto;
            transform: scale(1);
            transform-origin: center;
        }

        #counter.combo {
            transform: scale(1.25);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        body.split-layout #counter {
            transform-origin: top left;
        }
        
        .digit-container { position: relative; display: inline-block; height: 1em; width: 0.6em; text-align: center; }
        .sep { width: 0.25em; }

        .digit {
            display: block;
            position: absolute;
            left: 0;
            right: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        .digit.new { transform: translateY(-120%); opacity: 0; }
        .digit.current { transform: translateY(0); opacity: 1; }
        .digit.old { transform: translateY(120%); opacity: 0; }

        #menu {
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(3px) saturate(200%);
            -webkit-backdrop-filter: blur(3px) saturate(200%);
            padding: 14px 18px;
            border-radius: 20px;
            display: flex;
            gap: 14px;
            align-items: stretch;
            transition: bottom 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s ease;
            opacity:0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10000;
            width: max-content;
            max-width: calc(100vw - 24px);
            flex-wrap: nowrap;
            justify-content: center;
            box-sizing: border-box;
        }
        #menu.show { bottom:30px; opacity:1; }

        #menu button, #menu label {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
            box-sizing: border-box;
            height: 42px;
        }
        #menu button:hover, #menu label:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            border-color: white;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
        }

        #menu #reset { background: rgba(255, 255, 255, 0.05); }
        #menu #reset:hover { border-color: #e7c039 !important; box-shadow: 0 0 15px rgba(231, 192, 57, 0.3) !important; }
        #menu #reset:active { background: #e7c039 !important; color: black !important; }
        #menu #spotify-btn:hover, #menu #spotify-btn.active-widget { border-color: #25d865 !important; box-shadow: 0 0 15px rgba(37, 216, 101, 0.3) !important; }
        #menu #spotify-btn:active, #menu #spotify-btn.active-widget { background: #25d865 !important; }
        #menu #spotify-btn:active img, #menu #spotify-btn.active-widget img { filter: brightness(0); }
        #menu #pages-btn:hover, #menu #pages-btn.active-widget { border-color: #7aa3ff !important; box-shadow: 0 0 15px rgba(122, 163, 255, 0.3) !important; }
        #menu #pages-btn:active, #menu #pages-btn.active-widget { background: #7aa3ff !important; }
        #menu #pages-btn:active img, #menu #pages-btn.active-widget img { filter: brightness(0); }
        #menu #settings-btn:hover, #menu #settings-btn.active-widget { border-color: #b48dff !important; box-shadow: 0 0 15px rgba(180, 141, 255, 0.3) !important; }
        #menu #settings-btn:active, #menu #settings-btn.active-widget { background: #b48dff !important; color: black !important; }
        #menu #close:hover { border-color: #ff5a52 !important; box-shadow: 0 0 15px rgba(255, 90, 82, 0.3) !important; }
        #menu #close:active { background: #ff5a52 !important; color: black !important; }
        #menu button:active, #menu label:active { transform: translateY(1px) scale(0.95); }
        #menu input { accent-color: white; margin-left:8px; cursor: pointer; }

        #spotify-widget {
            position: fixed;
            top: 20px;
            bottom: 20px;
            right: 20px;
            width: 360px;
            z-index: 9000;
            border-radius: 12px;
            transform: translateX(150%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        }
        #spotify-widget.open { transform: translateX(0); }
        #spotify-widget iframe { height: 100% !important; border-radius: 12px; border: none; }

        #pages-menu {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 9500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
        }
        #pages-menu.open { opacity: 1; pointer-events: auto; }
        #pages-card {
            width: min(92vw, 520px);
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 18px 18px 16px 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
        }
        #pages-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        #pages-header h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: lowercase;
        }
        #pages-close {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: lowercase;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
        }
        #pages-close:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff5a52;
            box-shadow: 0 0 15px rgba(255, 90, 82, 0.3);
        }
        #pages-close:active {
            transform: translateY(1px) scale(0.95);
            background: #ff5a52;
            color: black;
        }
        #pages-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .pages-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            text-transform: lowercase;
        }
        .pages-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .pages-badge {
            font-size: 0.8rem;
            opacity: 0.7;
            text-transform: lowercase;
        }
        .pages-soon {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 14px;
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            font-size: 0.95rem;
            text-transform: lowercase;
        }

        #settings-menu {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 9550;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            padding: 16px 16px var(--settings-menu-safe-bottom) 16px;
            box-sizing: border-box;
        }
        #settings-menu.open { opacity: 1; pointer-events: auto; }
        #settings-card {
            width: min(92vw, 440px);
            max-width: 100%;
            max-height: min(calc(100vh - 16px - var(--settings-menu-safe-bottom)), 720px);
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 18px 18px 16px 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.38) transparent;
        }
        #settings-card::-webkit-scrollbar {
            width: 10px;
        }
        #settings-card::-webkit-scrollbar-track {
            background: transparent;
        }
        #settings-card::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.26));
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        #settings-card::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.34));
        }
        #settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        #settings-header h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: lowercase;
        }
        #settings-close {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: lowercase;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
        }
        #settings-close:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff5a52;
            box-shadow: 0 0 15px rgba(255, 90, 82, 0.3);
        }
        #settings-close:active {
            transform: translateY(1px) scale(0.95);
            background: #ff5a52;
            color: black;
        }
        #settings-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .settings-section-title {
            margin: 0 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: lowercase;
            color: rgba(255, 255, 255, 0.58);
        }
        .settings-section-title::after {
            content: "";
            flex: 1 1 auto;
            border-bottom: 2px dotted rgba(255, 255, 255, 0.34);
            transform: translateY(1px);
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            color: white;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-transform: lowercase;
            cursor: pointer;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease, color 0.3s ease;
        }
        .settings-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            border-color: white;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
        }
        .settings-item:active {
            transform: translateY(1px) scale(0.98);
        }
        .settings-copy {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .settings-title {
            font-size: 0.98rem;
        }
        .settings-desc {
            font-size: 0.82rem;
            opacity: 0.7;
            line-height: 1.35;
        }
        .settings-item input {
            margin: 0;
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
        }
        .settings-select {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 34px 8px 12px;
            font: inherit;
            text-transform: lowercase;
            cursor: pointer;
            min-width: 118px;
            background-image:
                linear-gradient(45deg, transparent 50%, white 50%),
                linear-gradient(135deg, white 50%, transparent 50%);
            background-position:
                calc(100% - 18px) calc(50% - 3px),
                calc(100% - 12px) calc(50% - 3px);
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
        }
        .settings-select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
        }
        .settings-select option {
            color: black;
            background: white;
        }
        .settings-item[data-select-target] {
            user-select: none;
        }
        .settings-subsection {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .settings-subsection[hidden] {
            display: none;
        }

        .plusone {
            position:absolute;
            color:white;
            font-size:2rem;
            font-weight:600;
            animation: plusone-move 0.8s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
            pointer-events:none;
            z-index: 2;
        }
        @keyframes plusone-move {
            0% { transform: translate(-50%, 10px) scale(0.5); opacity:0; }
            30% { transform: translate(-50%, -20px) scale(1.2); opacity:1; }
            100% { transform: translate(-50%, -80px) scale(1); opacity:0; }
        }

        .plusten {
            position: absolute;
            color: white;
            font-size: 4rem;
            font-weight: 800;
            display: flex;
            animation: plusten-hold-move 2.1s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
            pointer-events: none;
            z-index: 12000;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .plusten span {
            display: inline-block;
            animation: big-wave 0.5s ease-in-out infinite alternate;
        }
        .plusten span:nth-child(2) { animation-delay: 0.12s; }
        .plusten span:nth-child(3) { animation-delay: 0.24s; }

        @keyframes plusten-hold-move {
            0% { transform: translate(-50%, 10px) scale(0.7); opacity: 0; }
            15% { transform: translate(-50%, -30px) scale(1.3); opacity: 1; }
            70% { transform: translate(-50%, -40px) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1); opacity: 0; }
        }
        @keyframes big-wave {
            from { transform: translateY(-10px); }
            to { transform: translateY(10px); }
        }

        .shake { animation: shake 0.5s ease-in-out infinite; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        .explosion-effect {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            object-fit: fill;
        }

        #hammer {
            position: fixed;
            left: 60px;
            bottom: -100px;
            font-size: 60px;
            cursor: grab;
            z-index: 11000;
            user-select: none;
            transition: transform 0.1s linear, bottom 0.3s ease-out, opacity 0.5s ease;
            pointer-events: auto;
        }
        #hammer:active { cursor: grabbing; }

        .bw-mode #bg-canvas, 
        .bw-mode #menu, 
        .bw-mode #text-container, 
        .bw-mode #spotify-widget, 
        .bw-mode #pages-menu,
        .bw-mode #settings-menu,
        .bw-mode #hammer {
            transition: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
        
        .bw-mode #slime {
            transition: none !important;
            filter: grayscale(1) brightness(0) !important;
            transform: translateX(-25vw) translateY(var(--slime-base-y)) scale(1.1) !important;
            cursor: pointer !important;
        }

        .bw-mode #slime.faded {
            transition: filter 2s ease-in-out !important;
            filter: grayscale(1) brightness(0.7) !important;
        }

            #pages-menu {
                padding: 20px;
                box-sizing: border-box;
            }

            #pages-card {
                width: min(100%, 520px);
            }

            #settings-menu {
                padding: 20px;
                box-sizing: border-box;
            }

            #settings-card {
                width: min(100%, 440px);
            }

    </div>

    <script>
        const audioReset = new Audio('./index_files/explode.wav');
        const audioChime = new Audio('./index_files/clock_chime.mp3');
        const audioIn = new Audio('./index_files/ui-in.ogg');
        const audioOut = new Audio('./index_files/ui-out.ogg');
        const audioBonk = new Audio('./index_files/bonk.mp3');

        function playSound(audioNode) {
            const clone = audioNode.cloneNode();
            clone.play().catch(e => {});
            clone.onended = () => clone.remove();
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x: -2000, y: -2000, active: false };
        let offset = 0;
        const spacing = 45; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            offset += 0.4;
            const time = Date.now() / 50;
            const startX = -spacing;
            const startY = -spacing;
            const endX = canvas.width + spacing;
            const endY = canvas.height + spacing;

            for (let x = startX; x < endX; x += spacing) {
                for (let y = startY; y < endY; y += spacing) {
                    let posX = x + (offset % spacing);
                    let posY = y + (offset % spacing);
                    let drawX = posX;
                    let drawY = posY;

                    if (mouse.active) {
                        const dx = mouse.x - posX;
                        const dy = mouse.y - posY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = 180;
                        if (dist < maxDist) {
                            const force = (maxDist - dist) / maxDist;
                            drawX += dx * force * 0.25;
                            drawY += dy * force * 0.25;
                        }
                    }

                    const hue = (time + (x + y) * 0.1) % 360;
                    ctx.fillStyle = `hsla(${hue}, 60%, 15%, 0.8)`;
                    ctx.beginPath();
                    ctx.arc(drawX, drawY, 4.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();

        function updateRollingText(element, nextStr) {
            const currentStr = element.getAttribute('data-value') || "";
            if (currentStr === nextStr) return;
            element.setAttribute('data-value', nextStr);
            if (document.hidden || currentStr.length !== nextStr.length) {
                element.innerHTML = '';
                for (let char of nextStr) {
                    const wrap = document.createElement('span');
                    const isNum = !isNaN(parseInt(char));
                    wrap.className = 'digit-container' + (isNum ? '' : ' sep');
                    wrap.innerHTML = `<span class="digit current">${char}</span>`;
                    element.appendChild(wrap);
                }
            } else {
                const containers = element.querySelectorAll('.digit-container');
                for (let i = 0; i < nextStr.length; i++) {
                    const oldDigit = containers[i].querySelector('.digit.current');
                    if (oldDigit && oldDigit.textContent !== nextStr[i]) {
                        const newDigit = document.createElement('span');
                        newDigit.className = 'digit new';
                        newDigit.textContent = nextStr[i];
                        containers[i].appendChild(newDigit);
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                oldDigit.classList.replace('current', 'old');
                                newDigit.classList.replace('new', 'current');
                                setTimeout(() => oldDigit.remove(), 600);
                            });
                        });
                    }
                }
            }
        }

        let lastChimedHour = new Date().getHours();
        function getTimeZoneString() {
            const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const now = new Date();
            const offsetMinutes = -now.getTimezoneOffset();
            const hours = Math.floor(Math.abs(offsetMinutes) / 60);
            const minutes = Math.abs(offsetMinutes) % 60;
            const sign = offsetMinutes >= 0 ? "+" : "-";
            return `${timeZone}, utc${sign}${hours}:${minutes.toString().padStart(2, '0')}`.toLowerCase();
        }
        const fullTimeZoneInfo = getTimeZoneString();

        function updateClock(){
            const n=new Date();
            const hours = n.getHours();
            const minutes = n.getMinutes();
            const seconds = n.getSeconds();
            const timeStr = String(hours).padStart(2,'0')+':'+String(minutes).padStart(2,'0')+':'+String(seconds).padStart(2,'0');
            const dateStr = n.toLocaleDateString();
            if (minutes === 0 && seconds === 0 && hours !== lastChimedHour) {
                playSound(audioChime); lastChimedHour = hours;
            } else if (minutes !== 0) { lastChimedHour = -1; }
            const clockEl = document.getElementById('clock');
            updateRollingText(clockEl, timeStr);
            updateRollingText(document.getElementById('date'), dateStr);
            if (clockEl.title !== fullTimeZoneInfo) clockEl.title = fullTimeZoneInfo;
        }
        setInterval(updateClock,1000); updateClock();

        const img=document.getElementById('slime');
        const counter=document.getElementById('counter');
        const menu=document.getElementById('menu');
        const resetBtn=document.getElementById('reset');
        const spotifyBtn=document.getElementById('spotify-btn');
        const spotifyWidget=document.getElementById('spotify-widget');
        const pagesBtn=document.getElementById('pages-btn');
        const pagesMenu=document.getElementById('pages-menu');
        const pagesClose=document.getElementById('pages-close');
        const settingsBtn=document.getElementById('settings-btn');
        const settingsMenu=document.getElementById('settings-menu');
        const settingsCard=document.getElementById('settings-card');
        const settingsClose=document.getElementById('settings-close');
        const followToggle=document.getElementById('follow');
        const layoutControlModeSelect=document.getElementById('layout-control-mode');
        const layoutModeSelect=document.getElementById('layout-mode');
        const menuLayoutModeSelect=document.getElementById('menu-layout-mode');
        const separateLayoutSettings=document.getElementById('separate-layout-settings');
        const hueToggle=document.getElementById('hue-toggle');
        const bgToggle=document.getElementById('bg-toggle');
        const bgCanvas=document.getElementById('bg-canvas');
        const closeBtn=document.getElementById('close');
        const textContainer = document.getElementById('text-container');
        const hammer = document.getElementById('hammer');
        const body = document.getElementById('main-body');
        const slimeNotifyEndpoint = '/slime-click';
        const slimeNotifyCooldownMs = 60 * 60 * 1000;
        const slimeNotifyStorageKey = 'slimeLastNotifyAt';

        let clicks=Number(localStorage.getItem('slimeClicks'))||0;
        let activated=false;
        let followCursor=localStorage.getItem('followCursor')=== 'true';
        let layoutControlMode=localStorage.getItem('layoutControlMode') || 'separate';
        let layoutMode=localStorage.getItem('layoutMode') || 'auto';
        let menuLayoutMode=localStorage.getItem('menuLayoutMode') || 'auto';
        let hueOff=localStorage.getItem('hueOff')=== 'true';
        let bgOff=localStorage.getItem('bgOff')=== 'true';
        let resetPending=false;
        let resetTimeout=null;
        let isSlimeDown = false;
        let lastX = 0, lastY = 0;
        let isBWMode = false;
        let isBWLocked = false;
        let isSlimeBlocked = false;
        let isDraggingHammer = false;
        let hammerProgress = 0;
        let comboTimeout = null;

        followToggle.checked=followCursor;
        layoutControlModeSelect.value=layoutControlMode;
        layoutModeSelect.value=layoutMode;
        menuLayoutModeSelect.value=menuLayoutMode;
        hueToggle.checked=!hueOff;
        bgToggle.checked=!bgOff;
        if(hueOff) img.classList.remove('hue-anim');

        function updateLayoutControlVisibility() {
            separateLayoutSettings.hidden = layoutControlMode !== 'separate';
        }

        function getEffectiveLayoutMode() {
            return layoutControlMode === 'separate' ? layoutMode : layoutControlMode;
        }

        function getEffectiveMenuLayoutMode() {
            return layoutControlMode === 'separate' ? menuLayoutMode : layoutControlMode;
        }

        function openSelect(selectElement) {
            if (!selectElement) return;
            selectElement.focus({ preventScroll: true });
            if (typeof selectElement.showPicker === 'function') {
                try {
                    selectElement.showPicker();
                    return;
                } catch (error) {}
            }
            selectElement.click();
        }

        updateLayoutControlVisibility();

        function bumpCounter() {
            counter.classList.add('combo');
            clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                counter.classList.remove('combo');
            }, 800);
        }

        function updateCounterDisplay() {
            updateRollingText(counter, String(clicks));
            localStorage.setItem('slimeClicks', clicks);
            bumpCounter();
        }

        function animateCounterIncrement(amount) {
            let current = 0;
            const interval = setInterval(() => {
                clicks++;
                updateCounterDisplay();
                current++;
                if (current >= amount) clearInterval(interval);
            }, 120); 
        }

        async function notifySlimeClick() {
            const now = Date.now();
            const lastNotifyAt = Number(localStorage.getItem(slimeNotifyStorageKey)) || 0;

            if (now - lastNotifyAt < slimeNotifyCooldownMs) return;

            try {
                const response = await fetch(slimeNotifyEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        language: navigator.language || 'unknown',
                        screen: `${window.screen.width}x${window.screen.height}`,
                        page: window.location.href,
                        userAgent: navigator.userAgent
                    }),
                    keepalive: true
                });

                if (response.ok) {
                    localStorage.setItem(slimeNotifyStorageKey, String(now));
                }
            } catch (error) {}
        }

        function getSlimeBaseY() {
            return parseFloat(getComputedStyle(body).getPropertyValue('--slime-base-y')) || -45;
        }

        function applyTransform(x = 0, y = 0) {
            if(isBWMode || isSlimeBlocked) return;
            const scale = isSlimeDown ? 0.92 : 1;
            const translateY = getSlimeBaseY() + y;
            img.style.transform = `translateY(${translateY}px) translateX(${x}px) scale(${scale})`;
        }

        function showUI(){
            if(!activated){ 
                activated=true; 
                counter.style.opacity=1; 
                playSound(audioIn);
                if(!bgOff) bgCanvas.style.opacity = "1";
            }
            if(!menu.classList.contains('show')) {
                menu.classList.add('show');
                if(activated && clicks > 0) playSound(audioIn); 
            }
            updateResponsiveLayout();
        }

        function positionTextContainer(){
            if (body.classList.contains('split-layout')) {
                textContainer.style.top = '0px';
                return;
            }

            const imgRect = img.getBoundingClientRect();
            const scrollY = window.scrollY || document.documentElement.scrollTop;
            const naturalTop = imgRect.bottom + scrollY - 20;
            const menuRect = menu.classList.contains('show') ? menu.getBoundingClientRect() : null;
            const menuTop = menuRect ? (menuRect.top + scrollY) : Number.POSITIVE_INFINITY;
            const maxTop = menuTop - textContainer.offsetHeight - 16;
            textContainer.style.top = naturalTop + 'px';
        }

        function updateResponsiveLayout() {
            const menuRect = menu.classList.contains('show') ? menu.getBoundingClientRect() : null;
            const effectiveLayoutMode = getEffectiveLayoutMode();
            const effectiveMenuLayoutMode = getEffectiveMenuLayoutMode();
            const shouldSplitLayoutAuto = window.innerWidth >= 900 && window.innerWidth > window.innerHeight;
            const shouldSplitLayout = effectiveLayoutMode === 'auto'
                ? shouldSplitLayoutAuto
                : effectiveLayoutMode === 'horizontal';
            const splitMenuSpace = menuRect ? Math.max(window.innerHeight - menuRect.top, 120) : 0;
            const shouldUseShortSplitLayout = shouldSplitLayout && window.innerHeight <= 720;
            const settingsMenuSafeBottom = menuRect ? Math.max(window.innerHeight - menuRect.top + 12, 28) : 16;
            body.style.setProperty('--split-menu-space', `${splitMenuSpace}px`);
            body.style.setProperty('--settings-menu-safe-bottom', `${settingsMenuSafeBottom}px`);
            body.classList.toggle('viewport-vertical', window.innerHeight > window.innerWidth);
            body.classList.toggle('split-layout', shouldSplitLayout);
            body.classList.toggle('short-split-layout', shouldUseShortSplitLayout);
            body.classList.toggle('menu-force-horizontal', effectiveMenuLayoutMode === 'horizontal');
            body.classList.toggle('menu-force-vertical', effectiveMenuLayoutMode === 'vertical');
            if (!shouldSplitLayout) {
                body.classList.remove('compact-stack');
                positionTextContainer();
                const imgRect = img.getBoundingClientRect();
                const scrollY = window.scrollY || document.documentElement.scrollTop;
                const naturalTop = imgRect.bottom + scrollY - 20;
                const menuTop = menuRect ? (menuRect.top + scrollY) : Number.POSITIVE_INFINITY;
                const availableSpace = menuTop - naturalTop - 16;
                body.classList.toggle('compact-stack', availableSpace < textContainer.offsetHeight);
            } else {
                body.classList.remove('compact-stack');
            }
            positionTextContainer();
        }
        
        window.addEventListener('resize', () => {
            updateResponsiveLayout();
            positionTextContainer();
        });
        
        img.onload = () => {
            updateResponsiveLayout();
            positionTextContainer();
        };

        function spawnEffect(e, isTen) {
            const plus = document.createElement('div');
            plus.className = isTen ? 'plusten' : 'plusone';
            if (isTen) {
                plus.innerHTML = '<span>+</span><span>1</span><span>0</span>';
            } else {
                plus.textContent = '+1';
            }
            document.body.appendChild(plus);
            plus.style.left = e.clientX + 'px';
            plus.style.top = (e.clientY - 20) + 'px';
            
            if (isTen) {
                setTimeout(() => animateCounterIncrement(10), 500);
            }
            
            setTimeout(() => plus.remove(), isTen ? 2100 : 800);
        }

        body.addEventListener('mousedown', e => {
            if(isBWMode) {
                if(isBWLocked) return;
                isSlimeBlocked = true;
                img.classList.add('blocked');
                img.style.transform = `translateY(${getSlimeBaseY()}px) translateX(0px) scale(1)`;
                exitBWMode();
                spawnEffect(e, true);
                
                setTimeout(() => { 
                    isSlimeBlocked = false; 
                    img.classList.remove('blocked');
                    img.classList.add('nod-ready');
                    setTimeout(() => img.classList.remove('nod-ready'), 350);
                    applyTransform();
                }, 800);
                return;
            }
            if(e.target === img && !isDraggingHammer && !isSlimeBlocked) {
                isSlimeDown = true; 
                applyTransform(lastX, lastY);
            }
        });
        
        window.addEventListener('mouseup', () => { 
            isSlimeDown = false; 
            applyTransform(lastX, lastY); 
        });

        img.addEventListener('click', e => {
            if(isBWMode || isSlimeBlocked) return;
            showUI();
            clicks++;
            updateCounterDisplay();
            spawnEffect(e, false);
            notifySlimeClick();
            if(!hueOff) img.classList.add('hue-anim');
        });

        resetBtn.addEventListener('click',e=>{
            e.stopPropagation();
            if(!resetPending){
                resetPending=true;
                resetBtn.style.background='#e7c039';
                resetBtn.style.borderColor='#e7c039';
                resetBtn.style.color='black';
                resetBtn.classList.add('shake');
                resetTimeout = setTimeout(()=>{
                    resetPending=false;
                    resetBtn.style.background='rgba(255, 255, 255, 0.05)';
                    resetBtn.style.borderColor='rgba(255, 255, 255, 0.08)';
                    resetBtn.style.color='white';
                    resetBtn.classList.remove('shake');
                }, 3000);
            } else {
                clicks=0; updateCounterDisplay(); resetPending=false;
                clearTimeout(resetTimeout);
                resetBtn.style.background='rgba(255, 255, 255, 0.05)';
                resetBtn.style.borderColor='rgba(255, 255, 255, 0.08)';
                resetBtn.style.color='white';
                resetBtn.classList.remove('shake');
                playSound(audioReset);
                const boom = document.createElement('img');
                boom.className = 'explosion-effect';
                boom.src = './index_files/explosion-boom.gif?t=' + Date.now();
                const rect = counter.getBoundingClientRect();          
                boom.style.width = (rect.width + 120) + 'px';
                boom.style.left = (rect.left + rect.width / 2) + 'px';
                boom.style.top = (rect.top + rect.height / 2) + 'px';
                document.body.appendChild(boom);
                setTimeout(() => boom.remove(), 1600);
            }
        });

        spotifyBtn.addEventListener('click', ()=>{
            const isOpen = spotifyWidget.classList.toggle('open');
            spotifyBtn.classList.toggle('active-widget', isOpen);
            playSound(isOpen ? audioIn : audioOut);
        });

        function togglePagesMenu(forceOpen) {
            const isOpen = typeof forceOpen === 'boolean' ? forceOpen : !pagesMenu.classList.contains('open');
            if (isOpen && settingsMenu.classList.contains('open')) {
                settingsMenu.classList.remove('open');
                settingsMenu.setAttribute('aria-hidden', 'true');
                settingsBtn.classList.remove('active-widget');
            }
            pagesMenu.classList.toggle('open', isOpen);
            pagesMenu.setAttribute('aria-hidden', String(!isOpen));
            pagesBtn.classList.toggle('active-widget', isOpen);
            playSound(isOpen ? audioIn : audioOut);
        }

        function toggleSettingsMenu(forceOpen) {
            const isOpen = typeof forceOpen === 'boolean' ? forceOpen : !settingsMenu.classList.contains('open');
            if (isOpen && pagesMenu.classList.contains('open')) {
                pagesMenu.classList.remove('open');
                pagesMenu.setAttribute('aria-hidden', 'true');
                pagesBtn.classList.remove('active-widget');
            }
            settingsMenu.classList.toggle('open', isOpen);
            settingsMenu.setAttribute('aria-hidden', String(!isOpen));
            settingsBtn.classList.toggle('active-widget', isOpen);
            playSound(isOpen ? audioIn : audioOut);
        }

        pagesBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePagesMenu();
        });

        pagesClose.addEventListener('click', () => togglePagesMenu(false));
        pagesMenu.addEventListener('click', (e) => {
            if (e.target === pagesMenu) togglePagesMenu(false);
        });

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSettingsMenu();
        });

        settingsClose.addEventListener('click', () => toggleSettingsMenu(false));
        settingsMenu.addEventListener('click', (e) => {
            if (e.target === settingsMenu) toggleSettingsMenu(false);
        });

        followToggle.addEventListener('change',()=>{
            followCursor=followToggle.checked;
            localStorage.setItem('followCursor', followCursor);
            if(!followCursor) { lastX = 0; lastY = 0; applyTransform(); }
        });

        layoutControlModeSelect.addEventListener('change',()=>{
            layoutControlMode=layoutControlModeSelect.value;
            localStorage.setItem('layoutControlMode', layoutControlMode);
            updateLayoutControlVisibility();
            updateResponsiveLayout();
        });

        layoutModeSelect.addEventListener('change',()=>{
            layoutMode=layoutModeSelect.value;
            localStorage.setItem('layoutMode', layoutMode);
            updateResponsiveLayout();
        });

        menuLayoutModeSelect.addEventListener('change',()=>{
            menuLayoutMode=menuLayoutModeSelect.value;
            localStorage.setItem('menuLayoutMode', menuLayoutMode);
            updateResponsiveLayout();
        });

        document.querySelectorAll('.settings-item[data-select-target]').forEach((item) => {
            item.addEventListener('click', (event) => {
                const targetId = item.getAttribute('data-select-target');
                const select = document.getElementById(targetId);
                if (!select) return;
                if (event.target === select) return;
                openSelect(select);
            });
        });

        hueToggle.addEventListener('change',()=>{
            hueOff=!hueToggle.checked;
            localStorage.setItem('hueOff', hueOff);
            if(hueOff) img.classList.remove('hue-anim');
            else if(activated) img.classList.add('hue-anim');
        });

        bgToggle.addEventListener('change',()=>{
            bgOff=!bgToggle.checked;
            localStorage.setItem('bgOff', bgOff);
            if(bgOff) bgCanvas.style.opacity = "0";
            else if(activated) bgCanvas.style.opacity = "1";
        });

        closeBtn.addEventListener('click',()=>{
            menu.classList.remove('show');
            pagesMenu.classList.remove('open');
            pagesMenu.setAttribute('aria-hidden', 'true');
            pagesBtn.classList.remove('active-widget');
            settingsMenu.classList.remove('open');
            settingsMenu.setAttribute('aria-hidden', 'true');
            settingsBtn.classList.remove('active-widget');
            playSound(audioOut);
            updateResponsiveLayout();
        });

        document.addEventListener('mousemove',e=>{
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
            if(isDraggingHammer) {
                hammer.style.left = (e.clientX - 30) + 'px';
                hammer.style.top = (e.clientY - 30) + 'px';
                hammer.style.bottom = 'auto';
            }
            if(!followCursor || isBWMode || isSlimeBlocked) return;
            lastX = (e.clientX/window.innerWidth-0.5)*50;
            lastY = (e.clientY/window.innerHeight-0.5)*50;
            applyTransform(lastX, lastY);
        });

        window.addEventListener('wheel', e => {
            if(settingsMenu.classList.contains('open') && settingsCard.contains(e.target)) return;
            if(isBWMode || isDraggingHammer) return;
            if(e.deltaY < 0) hammerProgress = Math.min(1, hammerProgress + 0.1);
            else hammerProgress = Math.max(0, hammerProgress - 0.1);
            hammer.style.bottom = (-100 + (hammerProgress * 150)) + 'px';
        }, { passive: true });

        hammer.addEventListener('mousedown', e => {
            e.stopPropagation();
            if(hammerProgress > 0.05) {
                isDraggingHammer = true;
                hammer.style.transition = 'none';
            }
        });

        window.addEventListener('mouseup', e => {
            if(isDraggingHammer) {
                isDraggingHammer = false;
                hammer.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                hammer.style.pointerEvents = 'none';
                const hitElement = document.elementFromPoint(e.clientX, e.clientY);
                hammer.style.pointerEvents = 'auto';
                if(hitElement === img) {
                    playSound(audioBonk);
                    enterBWMode();
                }
                hammerProgress = 0;
                hammer.style.left = '60px';
                hammer.style.bottom = '-100px';
                hammer.style.top = 'auto';
            }
        });

        function enterBWMode() {
            isBWMode = true;
            isBWLocked = true;
            img.classList.remove('faded');
            document.body.classList.add('bw-mode');
            img.classList.remove('hue-anim');
            img.style.filter = 'grayscale(1) brightness(0)';
            
            setTimeout(() => {
                img.classList.add('faded');
            }, 50);
            setTimeout(() => {
                isBWLocked = false;
            }, 2000);
        }

        function exitBWMode() {
            isBWMode = false;
            document.body.classList.remove('bw-mode');
            img.classList.remove('faded');
            img.style.transition = 'none';
            img.style.filter = 'none';
            if(!hueOff) img.classList.add('hue-anim');
            applyTransform();
            setTimeout(() => {
                img.style.transition = '';
            }, 50);
        }

        updateCounterDisplay();
        window.addEventListener('load', () => {
            updateResponsiveLayout();
            positionTextContainer();
            setTimeout(positionTextContainer, 200);
        });
    </script>
</body>
</html>
